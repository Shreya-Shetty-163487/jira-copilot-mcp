{% extends "base.html" %}

{% block title %}Write a Post – The Blog{% endblock %}

{% block content %}
<h1 class="page-title">Write a New Post</h1>

<div class="card">
  {% if error %}
    <div class="alert">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('create_post') }}">
    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" placeholder="Give your post a title…"
             value="{{ request.form.get('title', '') }}" maxlength="200" required />
    </div>

    <div class="form-group">
      <label for="author">Your Name</label>
      <input type="text" id="author" name="author" placeholder="e.g. Jane Doe"
             value="{{ request.form.get('author', '') }}" maxlength="100" required />
    </div>

    <div class="form-group">
      <label for="content">Content</label>
      <textarea id="content" name="content" rows="14"
                placeholder="Write your post here…" required>{{ request.form.get('content', '') }}</textarea>
    </div>

    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <button class="btn btn-primary" type="submit">Publish Post</button>
      <a class="btn btn-secondary" href="{{ url_for('index') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
