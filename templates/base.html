<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}The Blog{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
    }

    :root[data-theme="light"] {
      --bg-color: #f8fafc;
      --text-color: #1e293b;
      --nav-bg-color: #ffffff;
      --nav-border-color: #e2e8f0;
      --btn-bg-color: #2563eb;
      --btn-hover-bg-color: #1d4ed8;
      --card-bg-color: #ffffff;
      --heading-color: #0f172a;
      --secondary-text-color: #475569;
      --meta-text-color: #94a3b8;
      --link-color: #2563eb;
      --divider-color: #e2e8f0;
      --input-bg-color: #ffffff;
      --input-text-color: #1e293b;
      --input-border-color: #cbd5e1;
      --input-focus-border: #2563eb;
      --input-focus-shadow: rgba(37, 99, 235, 0.12);
      --comment-bg-color: #f8fafc;
      --comment-border-color: #e2e8f0;
      --alert-bg-color: #ffe4e4;
      --alert-border-color: #cc3333;
      --alert-text-color: #8b0000;
    }

    :root[data-theme="dark"] {
      --bg-color: #0f172a;
      --text-color: #e2e8f0;
      --nav-bg-color: #1e293b;
      --nav-border-color: #334155;
      --btn-bg-color: #3b82f6;
      --btn-hover-bg-color: #60a5fa;
      --card-bg-color: #1e293b;
      --heading-color: #f1f5f9;
      --secondary-text-color: #94a3b8;
      --meta-text-color: #64748b;
      --link-color: #60a5fa;
      --divider-color: #334155;
      --input-bg-color: #0f172a;
      --input-text-color: #e2e8f0;
      --input-border-color: #475569;
      --input-focus-border: #60a5fa;
      --input-focus-shadow: rgba(96, 165, 250, 0.2);
      --comment-bg-color: #0f172a;
      --comment-border-color: #334155;
      --alert-bg-color: #3d1515;
      --alert-border-color: #f87171;
      --alert-text-color: #fca5a5;
    }

    /* ── Nav ── */
    nav {
      background: var(--nav-bg-color);
      border-bottom: 1px solid var(--nav-border-color);
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    nav .brand {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--btn-bg-color);
      text-decoration: none;
      letter-spacing: 0.5px;
    }
    nav a.btn-nav {
      background: var(--btn-bg-color);
      color: #ffffff;
      padding: 8px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
    }
    nav a.btn-nav:hover { background: var(--btn-hover-bg-color); }

    /* ── Theme toggle icon ── */
    #theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      line-height: 1;
      padding: 4px;
      border-radius: 50%;
      transition: transform 0.2s;
      color: var(--text-color);
    }
    #theme-toggle:hover { transform: scale(1.15); }

    /* ── Main container ── */
    .container {
      max-width: 860px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* ── Alert ── */
    .alert {
      background: var(--alert-bg-color);
      border-left: 4px solid var(--alert-border-color);
      padding: 12px 16px;
      margin-bottom: 20px;
      border-radius: 4px;
      font-family: Arial, sans-serif;
      font-size: 0.9rem;
      color: var(--alert-text-color);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      padding: 10px 22px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      font-size: 0.9rem;
      font-weight: bold;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary  { background: var(--btn-bg-color); color: #ffffff; }
    .btn-edit     { background: #0284c7; color: #ffffff; }
    .btn-delete   { background: #dc2626; color: #ffffff; }
    .btn-secondary{ background: #64748b; color: #ffffff; }

    /* ── Card ── */
    .card {
      background: var(--card-bg-color);
      border-radius: 8px;
      padding: 28px 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* ── Form ── */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--input-border-color);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.95rem;
      margin-bottom: 10px;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--input-bg-color);
      color: var(--input-text-color);
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 3px var(--input-focus-shadow);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    /* ── Page Title ── */
    .page-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--heading-color);
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <nav>
    <a href="{{ url_for('index') }}" class="brand">The Blog</a>
    <button id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">🌙</button>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      var html = document.documentElement;

      function applyTheme(theme) {
        html.setAttribute('data-theme', theme);
        btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        var label = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
        btn.title = label;
        btn.setAttribute('aria-label', label);
      }

      // Restore saved preference on load
      var saved = localStorage.getItem('theme') || 'light';
      applyTheme(saved);

      btn.addEventListener('click', function () {
        var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        localStorage.setItem('theme', next);
        applyTheme(next);
      });
    })();
  </script>
</body>
</html>
