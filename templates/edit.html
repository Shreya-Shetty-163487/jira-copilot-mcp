{% extends "base.html" %}

{% block title %}Edit Post – The Blog{% endblock %}

{% block content %}
<h1 class="page-title">Edit Post</h1>

<div class="card">
  {% if error %}
    <div class="alert">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('edit_post', post_id=post.id) }}">
    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" name="title"
             value="{{ request.form.get('title', post.title) }}" maxlength="200" required />
    </div>

    <div class="form-group">
      <label for="author">Author Name</label>
      <input type="text" id="author" name="author"
             value="{{ request.form.get('author', post.author) }}" maxlength="100" required />
    </div>

    <div class="form-group">
      <label for="content">Content</label>
      <textarea id="content" name="content" rows="14" required>{{ request.form.get('content', post.content) }}</textarea>
    </div>

    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <button class="btn btn-primary" type="submit">Save Changes</button>
      <a class="btn btn-secondary" href="{{ url_for('view_post', post_id=post.id) }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
